{% extends "admin/base.html" %}

{% block content %}

<h1>Create Appointment</h1>

<div class="page-links">
<a href="{{ url_for('admin_appointments_route') }}">Back</a>
</div>

<form method="POST">
    <label>Chosen Service:</label>
    <select name="selected-service" id="selected-service" title="selected-service" required>
        <option disabled selected>Choose a service:</option>
        <option>Hairstyles</option>
        <option>Wigs</option>
        <option>Nails</option>
    </select>
    
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="full_name" required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>

    <label for="phone">Phone:</label>
    <input type="tel" id="phone" name="phone" required>

    <label for="date">Date:</label>
    <input type="date" id="date" name="date" required>

    <label for="time">Time:</label>
    <input type="time" id="time" name="time" required>

    <label>Message:</label>
    <textarea type="text" name="message" id="message" title="message">Hello World</textarea>

    <button type="submit">Book Now</button>
</form>

{% endblock %}
