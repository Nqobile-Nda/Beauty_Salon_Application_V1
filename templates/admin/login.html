{% extends "admin/base.html" %}

{% block content %}

<div class="login-form">
    <form method="POST">
    <h1>Admin Login</h1>
    <label>Username:</label>
    <input name="username" title="username">

    <label>Password:</label>
    <input name="password" title="password" type="password">
    <button type="submit">Login</button>
    <div class="page-links"><a href="{{ url_for('user_home_route') }}">Not an admin?</a></div>
    </form>
</div>
{% endblock %}
